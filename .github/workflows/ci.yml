name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  OBSIDIAN_VERSION: "1.7.7"

jobs:
  basic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Obsidian unpacked
        uses: actions/cache@v4
        with:
          path: .obsidian-unpacked
          key: obsidian-${{ runner.os }}-${{ env.OBSIDIAN_VERSION }}

      - name: Extract Obsidian
        run: bash scripts/setup-obsidian.sh --ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: pnpm build

      - name: E2E setup (trust vault)
        run: pnpm e2e:setup

      - name: E2E tests
        run: pnpm e2e

      - name: Dump E2E failure context
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set +e
          report=$(mktemp)
          : > "$report"
          {
            echo '## E2E failure summary'
            if [ -f playwright-report/results.json ]; then
              echo ''
              echo '### Failing specs (from results.json)'
              echo ''
              echo '```json'
              node ./scripts/ci-dump-playwright-failures.mjs
              echo '```'
            else
              echo '_(no playwright-report/results.json found)_'
            fi
            echo ''
            echo '### Error contexts'
            shopt -s globstar nullglob
            found_ctx=0
            for f in test-results/**/error-context.md; do
              found_ctx=1
              echo ""
              echo "#### $f"
              echo ""
              echo '```'
              cat "$f"
              echo '```'
            done
            if [ "$found_ctx" = "0" ]; then
              echo '_(no error-context.md files found)_'
            fi
            echo ''
            echo '### test-results tree'
            echo ''
            echo '```'
            ls -laR test-results/ 2>&1
            echo '```'
          } > "$report"
          cat "$report" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${PR_NUMBER}" ] && [ "${PR_NUMBER}" != "0" ]; then
            gh_err=$(mktemp)
            if ! gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
                  --method POST -f body@"$report" 2>"$gh_err" >/dev/null; then
              echo "::error title=PR comment failed::gh api response: $(tr '\n' ' ' <"$gh_err")"
              cat "$gh_err"
            fi
          fi
          # Mirror the report into the workflow log too so it's grep-able.
          echo '----- E2E FAILURE REPORT -----'
          cat "$report"
          echo '----- END -----'
          exit 0

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
